name: Track NIFTY ATM

# Two runs on weekdays (times are UTC; IST = UTC + 5:30):
#   03:46 UTC = 09:16 IST  -> capture ATM + open values
#   09:59 UTC = 15:29 IST  -> capture close values for the same strike
# GitHub's scheduler is not second-precise and can run a few minutes late;
# the script records the actual fetch time, so that's fine.
on:
  schedule:
    - cron: "46 3 * * 1-5"
    - cron: "59 9 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  track:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch ATM data
        run: python fetch_atm.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update NIFTY ATM data ($(date -u +%Y-%m-%dT%H:%MZ))"
            git push
          fi
